<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITRO - Formulario OE (Organización de Evento)</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'IBM Plex Sans',sans-serif;background:linear-gradient(135deg,#18529D 0%,#113A70 100%);min-height:100vh;padding:20px;color:#122540}
        .container{max-width:900px;margin:0 auto;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .header{background:linear-gradient(140deg,#18529D 0%,#113A70 100%);padding:40px 30px;color:white;text-align:center}
        .header h1{font-size:2rem;margin-bottom:10px;font-weight:700}
        .header p{font-size:0.95rem;opacity:0.9}
        .header-logo{display:inline-block;width:60px;height:60px;background:rgba(51,195,242,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:15px}
        .content{padding:40px}
        .form-section{margin-bottom:30px}
        .section-title{display:flex;align-items:center;gap:15px;margin-bottom:20px;padding-bottom:15px;border-bottom:2px solid #27A84B}
        .section-number{background:#27A84B;color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
        .section-title h3{font-size:1.2rem;color:#0D1F3C;flex:1}
        .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
        .form-group.col-span-full{grid-column:1/-1}
        label{font-weight:600;color:#0D1F3C;margin-bottom:8px;font-size:0.95rem}
        .required::after{content:" *";color:#C0392B}
        input,select,textarea{padding:12px 14px;border:1px solid #C8D4E8;border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:0.95rem;color:#162040;width:100%;transition:all 0.3s}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#27A84B;box-shadow:0 0 0 3px rgba(39,168,75,0.1)}
        textarea{min-height:100px;resize:vertical}
        .error{border-color:#C0392B !important}
        .error-message{color:#C0392B;font-size:0.75rem;margin-top:4px;display:none}
        .error-message.show{display:block}
        .buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:40px;padding-top:30px;border-top:2px solid #E8EDF5}
        button{padding:12px 24px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.95rem;transition:all 0.3s;display:flex;align-items:center;gap:8px}
        .btn-primary{background:linear-gradient(135deg,#18529D 0%,#113A70 100%);color:white;flex:1;min-width:200px}
        .btn-primary:hover{box-shadow:0 8px 24px rgba(24,82,157,0.3);transform:translateY(-2px)}
        .btn-secondary{background:#E8EDF5;color:#0D1F3C}
        .btn-ghost{background:transparent;color:#27A84B;border:2px solid #27A84B}
        .config-section{background:#F2F5FA;border-radius:12px;padding:20px;margin-bottom:20px}
        .toast{position:fixed;bottom:20px;right:20px;padding:16px 24px;background:white;border-left:4px solid #27A84B;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:9999;animation:slideIn 0.3s ease}
        @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
        .loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:10000}
        .loading-overlay.show{display:flex}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .success-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:10000}
        .success-modal.show{display:flex}
        .modal-content{background:white;border-radius:16px;padding:40px;text-align:center;max-width:500px}
        .modal-icon{font-size:3rem;margin-bottom:20px}
        .modal-title{font-size:1.5rem;color:#0D1F3C;margin-bottom:10px;font-weight:700}
        @media(max-width:768px){.form-grid{grid-template-columns:1fr}.buttons{flex-direction:column}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logo">🎓</div>
            <h1>Organización de Evento</h1>
            <p>Centro de Investigaciones Tropicales - Universidad Veracruzana</p>
        </div>

        <div class="content">
            <div class="config-section">
                <strong>⚙️ Configuración de Envío</strong>
                <div class="form-grid" style="margin-top:15px">
                    <div class="form-group">
                        <label for="recipientEmail" class="required">Correo Destino</label>
                        <input type="email" id="recipientEmail" placeholder="ejemplo@uv.mx">
                    </div>
                    <div class="form-group">
                        <label for="senderEmail" class="required">Tu Correo</label>
                        <input type="email" id="senderEmail" placeholder="tu@uv.mx">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">
                    <div class="section-number">01</div>
                    <h3>Identificación del Solicitante</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group"><label for="apellidos" class="required">Apellidos</label><input type="text" id="apellidos" placeholder="García Morales"></div>
                    <div class="form-group"><label for="nombres" class="required">Nombres</label><input type="text" id="nombres" placeholder="Alejandro"></div>
                    <div class="form-group"><label for="matricula" class="required">Matrícula</label><input type="text" id="matricula" placeholder="S23XXXXXX"></div>
                    <div class="form-group"><label for="correo" class="required">Correo Institucional</label><input type="email" id="correo" placeholder="s23xxx@uv.mx"></div>
                    <div class="form-group col-span-full"><label for="programa" class="required">Programa Académico</label><select id="programa"><option>MET Maestría en Ecología Tropical</option><option>Doctorado en Ecología Tropical</option><option>Académico</option></select></div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">
                    <div class="section-number">02</div>
                    <h3>Datos del Evento</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group col-span-full"><label for="nombreEvento" class="required">Nombre del Evento</label><input type="text" id="nombreEvento" placeholder="Título completo"></div>
                    <div class="form-group"><label for="fechaEvento" class="required">Fecha del Evento</label><input type="date" id="fechaEvento"></div>
                    <div class="form-group"><label for="sede" class="required">Sede/Lugar</label><input type="text" id="sede" placeholder="Instalación, municipio"></div>
                    <div class="form-group"><label for="presupuesto" class="required">Presupuesto (MXN)</label><input type="number" id="presupuesto" placeholder="0.00" min="0" step="0.01"></div>
                    <div class="form-group"><label for="asistentes" class="required">Número de Asistentes</label><input type="number" id="asistentes" placeholder="80" min="1"></div>
                    <div class="form-group col-span-full"><label for="proyecto" class="required">Proyecto Asociado</label><input type="text" id="proyecto" placeholder="Clave o nombre"></div>
                    <div class="form-group col-span-full"><label for="lgac" class="required">Impacto en LGAC/PLADEA</label><textarea id="lgac" placeholder="Relación con LGAC..."></textarea></div>
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="btn-primary" onclick="submitForm()">📤 Enviar</button>
                <button type="button" class="btn-secondary" onclick="resetForm()">↻ Limpiar</button>
                <button type="button" class="btn-ghost" onclick="downloadPDF()">📥 PDF</button>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div><div class="spinner"></div><div style="color:white;margin-top:20px;font-weight:500">Generando...</div></div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <div class="modal-title">¡Enviado!</div>
            <div class="modal-text">Se envió a: <strong id="sentEmail"></strong></div>
            <button class="btn-primary" onclick="closeModal()" style="width:100%;margin:0">Aceptar</button>
        </div>
    </div>

    <script>
        emailjs.init("fl5frTANPYuqaW5-p");
        
        const required = ['recipientEmail','senderEmail','apellidos','nombres','matricula','correo','programa','nombreEvento','fechaEvento','sede','presupuesto','asistentes','proyecto','lgac'];
        
        function getVal(id){return document.getElementById(id).value.trim()}
        function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
        
        function validate(){
            let ok=true;
            required.forEach(id=>{
                const el=document.getElementById(id);
                const val=getVal(id);
                if(!val){el.classList.add('error');ok=false}else{el.classList.remove('error')}
            });
            if(!validateEmail(getVal('recipientEmail'))||!validateEmail(getVal('senderEmail'))){showToast('Correos inválidos','error');return false}
            if(!ok)showToast('Completa todos los campos','error');
            return ok;
        }
        
        function generatePDF(){
            const element=document.createElement('div');
            element.innerHTML=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:"Times New Roman",serif;font-size:12pt;line-height:1.6;margin:2cm;color:#111}p{margin-bottom:8px}h4{margin-top:16px;margin-bottom:8px;color:#18529D}.hdr{text-align:center;border-bottom:2px solid #18529D;padding-bottom:12px;margin-bottom:18px}strong{color:#000}</style></head><body><div class="hdr"><div style="font-size:9pt;color:#666">Centro de Investigaciones Tropicales</div><div style="font-size:15pt;font-weight:bold;color:#18529D">UNIVERSIDAD VERACRUZANA</div><div style="font-size:9pt;color:#666">Xalapa, Veracruz</div></div><p>A quien corresponda:</p><p>Yo, <strong>${getVal('nombres')} ${getVal('apellidos')}</strong>, matrícula <strong>${getVal('matricula')}</strong>, comunico la organización del siguiente evento:</p><h4>Evento</h4><p><strong>Nombre:</strong> ${getVal('nombreEvento')}<br><strong>Fecha:</strong> ${getVal('fechaEvento')}<br><strong>Sede:</strong> ${getVal('sede')}<br><strong>Presupuesto:</strong> $${getVal('presupuesto')}<br><strong>Asistentes esperados:</strong> ${getVal('asistentes')}</p><h4>Proyecto y LGAC</h4><p><strong>Proyecto:</strong> ${getVal('proyecto')}<br><strong>Impacto LGAC/PLADEA:</strong><br>${getVal('lgac')}</p><p style="margin-top:30px">Atentamente,<br><strong>${getVal('nombres')} ${getVal('apellidos')}</strong></p></body></html>`;
            const opts={margin:[15,18,15,18],filename:`OE_${getVal('matricula')}_${new Date().toISOString().split('T')[0]}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4'}};
            return new Promise((res,rej)=>{html2pdf().set(opts).from(element).save().then(()=>res()).catch(rej)});
        }
        
        function submitForm(){
            if(!validate())return;
            showLoading(true);
            generatePDF().then(()=>{
                const data={to_email:getVal('recipientEmail'),from_email:getVal('senderEmail'),apellidos:getVal('apellidos'),nombres:getVal('nombres'),nombreEvento:getVal('nombreEvento')};
                return emailjs.send('service_qy3lqek', 'template_pg_citro',data);
            }).then(()=>{
                showLoading(false);
                document.getElementById('sentEmail').textContent=getVal('recipientEmail');
                document.getElementById('successModal').classList.add('show');
                resetForm();
            }).catch(err=>{
                showLoading(false);
                showToast('Error: '+err.message,'error');
            });
        }
        
        function downloadPDF(){
            if(!validate())return;
            showLoading(true);
            generatePDF().then(()=>{showLoading(false);showToast('Descargado','success')}).catch(err=>{showLoading(false);showToast('Error','error')});
        }
        
        function resetForm(){document.querySelectorAll('input,select,textarea').forEach(el=>{if(!el.id.includes('recipient')&&!el.id.includes('sender'))el.value=''});document.querySelectorAll('.error').forEach(el=>el.classList.remove('error'))}
        function showLoading(s){document.getElementById('loadingOverlay').classList.toggle('show',s)}
        function closeModal(){document.getElementById('successModal').classList.remove('show')}
        function showToast(msg,type='info'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4000)}
        
        document.addEventListener('DOMContentLoaded',()=>{document.getElementById('fechaEvento').valueAsDate=new Date()});
    </script>
</body>
</html>
